import 'package:flutter/material.dart';
import '../data/DatabaseHelper.dart';
import '../data/LecturerModel.dart';
import '../reuseable/MyLecturerInfo.dart';
import 'AddLecturerScreen.dart';

class AdminEditScreen extends StatefulWidget {
  @override
  _AdminEditScreenState createState() => _AdminEditScreenState();
}

class _AdminEditScreenState extends State<AdminEditScreen> {
  List<Lecturer> _lecturers = [];

  @override
  void initState() {
    super.initState();
    _fetchLecturers();
  }

  void _fetchLecturers() {
    DatabaseHelper.readFirebaseRealtimeDBMain((lecturers) {
      setState(() {
        _lecturers = lecturers;
      });
    });
  }

  void _deleteLecturer(String key) {
    DatabaseHelper.deleteLecturer(key).then((_) {
      print("Lecturer deleted successfully!");
      _fetchLecturers(); // Refresh the list after deletion
    }).catchError((error) {
      print("Error deleting lecturer: $error");
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        backgroundColor: Colors.white,

        title: Row(
          children: [
            const SizedBox(width: 20),
            Image.asset(
              'images/logo.png',
              width: 50,
              height: 50,
            ),
            const Text(
              'Admin Authorities',
              style: TextStyle(
                fontSize: 24,
                fontWeight: FontWeight.bold,
                color: Color.fromRGBO(25, 38, 93, 1),
              ),
            ),
          ],
        ),

        leading: IconButton(
          icon: const Icon(
            Icons.arrow_back,
            size: 45,
            color: Color.fromRGBO(25, 38, 93, 1),
          ),
          onPressed: () {
            Navigator.pop(context);
          },
        ),
      ),
      body: ListView.builder(
        itemCount: _lecturers.length,
        itemBuilder: (context, index) {
          final lecturer = _lecturers[index];
          return MyLecturerInfo(
            lecturer: lecturer,
            onDelete: () => _deleteLecturer(lecturer.key!),
          );
        },
      ),
      floatingActionButton: FloatingActionButton(
        backgroundColor: const Color.fromRGBO(238, 155, 60, 1),
        onPressed: () {
          Navigator.push(
            context,
            MaterialPageRoute(builder: (context) => const AddLecturerScreen()),
          ).then((value) {
            if (value == true) {
              _fetchLecturers(); // Refresh the list after adding a new lecturer
            }
          });
        },
        child: const Icon(Icons.add, color: Color.fromRGBO(25, 38, 93, 1)),
      ),
    );
  }
}
